services:
  - type: worker
    name: fartdog-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: FARTDOG_X_LAUNCH
        value: true
      - key: ENVIRONMENT
        value: production
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: SOLSCAN_API_KEY
        sync: false
      - key: BASESCAN_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: MORALIS_API_KEY
        sync: false
      - key: GOPLUS_BASE_URL
        value: https://api.gopluslabs.io/api/v1/token_security
      - key: GOPLUS_APP_KEY
        sync: false
      - key: GOPLUS_APP_SECRET
        sync: false
      - key: BITQUERY_API_KEY
        sync: false